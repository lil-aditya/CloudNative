# Production-oriented Nginx config (placeholder)
# You can add caching, gzip, security headers, rate limiting, etc.

worker_processes auto;

events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  upstream auth_service { server auth-service:8080; }
  upstream file_service { server file-service:8080; }

  server {
    listen 80;

    location /api/auth/ { proxy_pass http://auth_service/; }
    location /api/files/ { proxy_pass http://file_service/; }
  }
}
