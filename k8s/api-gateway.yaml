apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: cloudnative
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: cloudnative/api-gateway:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: cloudnative
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 80
