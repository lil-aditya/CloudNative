apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: cloudnative
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudnative-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: cloudnative
spec:
  selector:
    app: database
  ports:
    - port: 5432
      targetPort: 5432
